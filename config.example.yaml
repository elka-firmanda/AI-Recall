server:
  host: "0.0.0.0"
  port: 8080
  # Auth token - will be auto-generated on first run if not set
  # Set this to a secure value for production
  # auth_token: "arec_your_secure_token_here"
  log_level: "info"

storage:
  data_dir: "/data"
  max_file_size_mb: 10

qdrant:
  url: "http://qdrant:6334"
  api_key: null
  collection_name: "memories"
  graph_collection_name: "memory_graph"
  vector_size: 1536
  distance: "Cosine"

embeddings:
  provider: "openai"  # or "openrouter"
  api_key: ""  # Set via AI_RECALL_EMBEDDINGS_API_KEY env var
  model: "text-embedding-3-small"
  dimension: 1536
  batch_size: 100
  timeout_secs: 30
  base_url: null  # Set for OpenRouter: "https://openrouter.ai/api/v1"

memory_defaults:
  default_confidence: 0.8
  min_confidence_threshold: 0.5
  auto_link: true
  auto_extract_wikilinks: true
